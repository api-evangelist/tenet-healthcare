naftiko: "1.0.0-alpha1"

info:
  label: "Tenet Healthcare FHIR R4 API"
  description: "HL7 FHIR R4 patient API for Tenet Health covering patients, appointments, observations, conditions, medications, and clinical documents with SMART on FHIR authorization."
  tags:
    - Healthcare
    - FHIR
    - Patient Portal
    - Clinical Data
    - Hospitals
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TENET_FHIR_TOKEN: TENET_FHIR_TOKEN

capability:
  consumes:
    - type: http
      namespace: tenet-fhir
      baseUri: https://api.tenethealth.com/fhir/r4
      description: "Tenet Healthcare FHIR R4 API"
      authentication:
        type: bearer
        token: "{{TENET_FHIR_TOKEN}}"
      resources:
        - name: patient
          path: /Patient/{id}
          description: "Patient demographic information"
          operations:
            - name: get-patient
              method: GET
              description: "Get patient record"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Patient FHIR resource ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: patient-appointments
          path: /Patient/{id}/Appointment
          description: "Patient appointments"
          operations:
            - name: list-patient-appointments
              method: GET
              description: "List appointments for a patient"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Patient FHIR resource ID"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Appointment status filter"
                - name: date
                  in: query
                  type: string
                  required: false
                  description: "Date filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: appointments
          path: /Appointment
          description: "Appointment search"
          operations:
            - name: search-appointments
              method: GET
              description: "Search appointments"
              inputParameters:
                - name: patient
                  in: query
                  type: string
                  required: false
                  description: "Patient reference"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Status filter"
                - name: _count
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: patient-observations
          path: /Patient/{id}/Observation
          description: "Patient clinical observations"
          operations:
            - name: list-patient-observations
              method: GET
              description: "List clinical observations for a patient"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Patient FHIR resource ID"
                - name: category
                  in: query
                  type: string
                  required: false
                  description: "Observation category (vital-signs, laboratory)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: patient-conditions
          path: /Patient/{id}/Condition
          description: "Patient diagnoses and conditions"
          operations:
            - name: list-patient-conditions
              method: GET
              description: "List conditions for a patient"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Patient FHIR resource ID"
                - name: clinical-status
                  in: query
                  type: string
                  required: false
                  description: "Condition status filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: patient-medications
          path: /Patient/{id}/MedicationRequest
          description: "Patient medication requests"
          operations:
            - name: list-patient-medications
              method: GET
              description: "List medications for a patient"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Patient FHIR resource ID"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Medication status filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: patient-documents
          path: /Patient/{id}/DocumentReference
          description: "Patient clinical documents"
          operations:
            - name: list-patient-documents
              method: GET
              description: "List clinical document references for a patient"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Patient FHIR resource ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tenet-fhir-api
      resources:
        - path: /v1/patients/{patientId}
          name: patient
          operations:
            - method: GET
              name: get-patient
              description: "Get patient record"
              call: "tenet-fhir.get-patient"
              with:
                id: "rest.patientId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tenet-fhir-mcp
      transport: http
      tools:
        - name: get-patient
          description: "Get a patient's demographic record"
          hints:
            readOnly: true
            openWorld: false
          call: "tenet-fhir.get-patient"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-appointments
          description: "List scheduled appointments for a patient"
          hints:
            readOnly: true
            openWorld: false
          call: "tenet-fhir.list-patient-appointments"
          outputParameters:
            - type: object
              mapping: "$."

specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Tenet Healthcare
providerId: tenet-healthcare
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Healthcare
description: >-
  FOCUS-aligned FinOps scaffold for Tenet Healthcare. Tenet is a hospital operator, not an API or SaaS
  vendor; there are no usage meters, public price list, or invoiced API charges to map to FOCUS columns.
sources:
  - https://www.tenethealth.com/
  - https://focus.finops.org/focus-specification/v1-3/
notes: >-
  Tenet does not invoice API or SaaS consumption to external developers; any cross-partner financial flows
  occur under partner-specific contracts. This artifact remains a placeholder.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Tenet Healthcare Corporation
serviceCategory: Healthcare
billingModel:
  pricingCategory: Subscription
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Tenet Healthcare
  ServiceCategory: Healthcare
  ProviderName: Tenet Healthcare
  PublisherName: Tenet Healthcare Corporation
  InvoiceIssuerName: Tenet Healthcare Corporation
  BillingCurrency: USD
meters:
  - name: partner_integration_charges
    unit: varies
    aggregation: sum
    dimensions:
      - partner_id
principles:
  - name: Visibility
    description: No external usage telemetry exists; visibility is internal to Tenet IT and any partner
      data-exchange settlements.
  - name: Allocation
    description: Allocation, where applicable, is per partner integration agreement rather than per API
      consumer.
  - name: Optimization
    description: Cost levers are property of Tenet's internal IT and revenue-cycle programs, not exposed
      externally.
  - name: Accountability
    description: Tenet IT and partnerships organization owns any inter-organization integration costs.
maintainers:

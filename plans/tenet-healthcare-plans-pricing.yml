description: >-
  Tenet Healthcare is a hospital and ambulatory care operator (Fortune 500); it does not publish a public
  developer API or commercial API price list. Any data exchange (HL7 / FHIR with payers and partners,
  patient portal integrations) is governed by per-partner business associate agreements and not sold as
  a product.
